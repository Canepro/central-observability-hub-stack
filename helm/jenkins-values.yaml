# Jenkins Controller on OKE (Phase 1 – Split-Agent Hybrid)
# Chart: jenkins/jenkins (https://charts.jenkins.io)
# Purpose: 24/7 controller on OKE; uses freed 50GB PVC (E1). AKS static agent connects via WebSocket (Phase 2).
#
# Version/plugins: Align with AKS Jenkins (ops repo jenkins-values.yaml). Image tag must exist on Docker Hub
# (e.g. 2.541.2-jdk17, lts-jdk17). Copy controller.installPlugins from AKS for exact parity.

# Release / naming
fullnameOverride: jenkins

# Controller
controller:
  componentName: jenkins-controller
  image:
    repository: jenkins/jenkins
    tag: "2.541.2-jdk17"
    pullPolicy: IfNotPresent

  numExecutors: 0
  executorMode: NORMAL

  # Admin: sourced from ExternalSecret/Infisical so login is reproducible from GitOps.
  admin:
    createSecret: false
    existingSecret: "jenkins-admin-credentials"
    userKey: "admin-user"
    passwordKey: "admin-password"

  # Align with AKS: enough memory and -Xmx so startup does not OOM
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"
  javaOpts: "-Xms1024m -Xmx3072m"

  # Probes: allow long startup after plugin updates (Jenkins can take 10–20 min to unpack/load)
  healthProbes: true
  probes:
    startupProbe:
      failureThreshold: 120  # 120 * 10s = 20 min (plugin updates need more time)
      periodSeconds: 10
      timeoutSeconds: 5
    livenessProbe:
      initialDelaySeconds: 300   # 5 min before first liveness check
      failureThreshold: 5
      periodSeconds: 10
      timeoutSeconds: 5
    readinessProbe:
      initialDelaySeconds: 300   # 5 min before first readiness check
      failureThreshold: 3
      periodSeconds: 10
      timeoutSeconds: 5

  serviceType: ClusterIP
  servicePort: 8080

  # Jenkins URL (required for agents and webhooks) — Phase 5: production hostname
  jenkinsUrlProtocol: https
  jenkinsUrl: "https://jenkins.canepro.me"

  # Ingress: expose on NGINX (jenkins-oke + jenkins.canepro.me via k8s/jenkins/)
  ingress:
    enabled: true
    apiVersion: "networking.k8s.io/v1"
    ingressClassName: nginx
    hostName: jenkins-oke.canepro.me
    path: /
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    tls:
      - secretName: jenkins-oke-tls
        hosts:
          - jenkins-oke.canepro.me

  # Agent listener: WebSocket only (no JNLP 50000). AKS agent connects via -webSocket to HTTPS.
  agentListenerEnabled: true
  agentListenerPort: 50000
  agentListenerServiceType: ClusterIP
  disabledAgentProtocols:
    - JNLP-connect
    - JNLP2-connect

  # Plugins: keep the controller plugin set explicit and reproducible.
  # This controller uses a long-lived PVC for JENKINS_HOME, so floating plugin resolution
  # can leave older plugin artifacts on disk and then break later restarts.
  # GitOps policy: manage plugin changes here and via ArgoCD sync; avoid UI plugin install/uninstall to prevent drift.
  installPlugins:
    - prism-api:1.30.0-717.vb_f8360844b_53
    - bouncycastle-api:2.30.1.83-289.v8426fcd19371
    - configuration-as-code:2088.ve3b_42c663c80
    - credentials-binding:725.ve52b_2328a_fde
    - git:5.10.1
    - github:1.47.0
    - workflow-aggregator:608.v67378e9d3db_1
    - kubernetes:4423.vb_59f230b_ce53
    - kubernetes-credentials-provider:1.303.vdfcf47fb_b_fef
    - pipeline-model-definition:2.2291.v2934911987b_6
    - pipeline-graph-view:940.v790e7a_c51722
    - pipeline-stage-view:2.41
    - github-branch-source:1967.1969.v205fd594c821
    - job-dsl:3654.vdf58f53e2d15
    - sshd:3.384.vc89b_5e138cf9
    - ws-cleanup:0.49
    # Transitive pins that have drifted on the persistent JENKINS_HOME plugin volume.
    - asm-api:9.10.1-216.va_9256d3b_844b_
    - durable-task:671.v340ff7959010
    - checks-api:373.vfe7645102093
    - echarts-api:6.0.0-1146.v5c8f3b_8f0573
    - git-client:6.6.0
    - gson-api:2.14.0-201.v8eefe5515533
    - jackson2-api:2.21.2-436.v29efdb_7418ff
    - jakarta-xml-bind-api:4.0.9-19.v2b_a_5b_44d9a_1c
    - joda-time-api:2.14.2-193.v422b_efce56e0
    - mailer:534.v1b_36f5864073
    - mina-sshd-api-common:2.17.1-187.v0341274c2905
    - mina-sshd-api-core:2.17.1-187.v0341274c2905
    - okhttp-api:5.3.2-200.vedb_720a_cf1f8
    - pipeline-groovy-lib:798.v5cc688825312
    - pipeline-input-step:551.vdff487c5998c
    - pipeline-milestone-step:152.v6e22b_8cfc66c
    - pipeline-model-api:2.2291.v2934911987b_6
    - pipeline-stage-step:345.va_96187909426
    - pipeline-stage-tags-metadata:2.2291.v2934911987b_6
    - ssh-credentials:372.va_250881b_08cd
    - workflow-api:1413.v2ff1a_5e720fa_
    - workflow-durable-task-step:1479.v56e587f413a_7
    - workflow-job:1571.1580.v18e46842c125
    - workflow-step-api:724.v538c2362b_dfb_
  installLatestPlugins: false
  overwritePlugins: true
  overwritePluginsFromImage: true

  # JCasC: welcome message + static node for AKS agent. defaultConfig: false so chart does not inject kubernetes cloud (avoids ConfigurationAsCodeBootFailure).
  JCasC:
    defaultConfig: false
    overwriteConfiguration: false
    securityRealm: |-
      local:
        allowsSignup: false
        enableCaptcha: false
        users:
          - id: "${chart-admin-username}"
            name: "Jenkins Admin"
            password: "${chart-admin-password}"
    authorizationStrategy: |-
      loggedInUsersCanDoAnything:
        allowAnonymousRead: false
    configScripts:
      welcome-message: |
        jenkins:
          systemMessage: "Jenkins on OKE (Split-Agent). AKS agent label: aks-agent. Connect with -webSocket over 443."
      github-config: |
        unclassified:
          gitHubPluginConfig:
            configs:
              - name: "GitHub"
                apiUrl: "https://api.github.com"
                credentialsId: "github-token"
                manageHooks: true
      aks-agent-node: |
        jenkins:
          nodes:
            - permanent:
                name: "aks-agent"
                numExecutors: 1
                remoteFS: "/home/jenkins/agent"
                labelString: "aks-agent"
                launcher:
                  inbound: {}
                retentionStrategy: "always"
      # Kubernetes cloud for dynamic agents on OKE (required for agent { kubernetes { ... } } DSL in Jenkinsfiles)
      # Note: OKE uses CRI-O which enforces fully qualified image names (docker.io/...)
      oke-kubernetes-cloud: |
        jenkins:
          clouds:
            - kubernetes:
                name: "kubernetes"
                serverUrl: "https://kubernetes.default"
                namespace: "jenkins"
                jenkinsUrl: "http://jenkins.jenkins.svc.cluster.local:8080"
                jenkinsTunnel: "jenkins-agent.jenkins.svc.cluster.local:50000"
                containerCapStr: "10"
                connectTimeout: "5"
                readTimeout: "15"
                maxRequestsPerHostStr: "32"
                retentionTimeout: "5"
                waitForPodSec: "600"
                templates:
                  - name: "default"
                    label: ""
                    nodeUsageMode: "NORMAL"
                    containers:
                      - name: "jnlp"
                        # Must be fully qualified for OKE/CRI-O. Use same tag as plugin default (3355) to avoid pull mismatch.
                        image: "docker.io/jenkins/inbound-agent:3355.v388858a_47b_33-8-jdk21"
                        alwaysPullImage: false
                        workingDir: "/home/jenkins/agent"
                        ttyEnabled: true
                        resourceRequestCpu: "100m"
                        resourceRequestMemory: "256Mi"
                        resourceLimitCpu: "500m"
                        resourceLimitMemory: "512Mi"
      managed-jobs: |
        jobs:
          - script: |
              pipelineJob('version-check-rocketchat-k8s') {
                description('Automated version checking pipeline for rocketchat-k8s. Runs on weekdays during 14:30-14:59 Europe/London and stays aligned with the repo Jenkinsfile.')
                triggers {
                  cron('H(30-59) 14 * * 1-5')
                }
                definition {
                  cpsScm {
                    scm {
                      git {
                        remote {
                          url('https://github.com/Canepro/rocketchat-k8s')
                          credentials('github-token')
                        }
                        branch('*/main')
                        extensions {
                          cleanBeforeCheckout()
                        }
                      }
                    }
                    scriptPath('.jenkins/version-check.Jenkinsfile')
                    lightweight(false)
                  }
                }
              }
              pipelineJob('security-validation-rocketchat-k8s') {
                description('Automated security validation pipeline for rocketchat-k8s. Runs on weekdays during 15:00-15:29 Europe/London and stays aligned with the repo Jenkinsfile.')
                triggers {
                  cron('H(0-29) 15 * * 1-5')
                }
                definition {
                  cpsScm {
                    scm {
                      git {
                        remote {
                          url('https://github.com/Canepro/rocketchat-k8s')
                          credentials('github-token')
                        }
                        branch('*/main')
                        extensions {
                          cleanBeforeCheckout()
                        }
                      }
                    }
                    scriptPath('.jenkins/security-validation.Jenkinsfile')
                    lightweight(false)
                  }
                }
              }

  # Sidecar: reload JCasC on config change
  sidecars:
    configAutoReload:
      enabled: true

  # Tests: disable to avoid extra resources
  testEnabled: false

# In-cluster K8s agent: enabled for dynamic pods on OKE (required for agent { kubernetes { ... } } DSL)
agent:
  enabled: true
  namespace: jenkins

# Persistence: use freed 50GB slot (E1); OCI Block Volume
persistence:
  enabled: true
  size: 50Gi
  storageClass: oci-bv
  accessMode: ReadWriteOnce
  existingClaim: ""

# RBAC
rbac:
  create: true
  readSecrets: true

serviceAccount:
  create: true
