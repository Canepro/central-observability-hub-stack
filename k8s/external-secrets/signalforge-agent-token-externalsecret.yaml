apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: signalforge-agent-token
  namespace: signalforge
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical-oke-signalforge
  target:
    name: signalforge-agent-token
    # The signalforge-agent release consumes this Secret via
    # agent.token.existingSecret, so ESO owns the Secret object.
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: SIGNALFORGE_AGENT_TOKEN
