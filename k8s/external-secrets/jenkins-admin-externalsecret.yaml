apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jenkins-admin-credentials
  namespace: jenkins
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: oci-vault
  target:
    name: jenkins-admin-credentials
    creationPolicy: Owner
    template:
      data:
        admin-user: "{{ .username }}"
        admin-password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: jenkins-admin-username
    - secretKey: password
      remoteRef:
        key: jenkins-admin-password
