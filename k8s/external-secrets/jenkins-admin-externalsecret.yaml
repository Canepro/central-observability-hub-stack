apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jenkins-admin
  namespace: jenkins
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-keyvault
  target:
    name: jenkins-admin
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: jenkins-admin-username
    - secretKey: password
      remoteRef:
        key: jenkins-admin-password
