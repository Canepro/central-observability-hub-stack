apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jenkins-github
  namespace: jenkins
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: oci-vault
  target:
    name: github-token
    creationPolicy: Owner
    template:
      data:
        username: "jenkins-bot"
        password: "{{ .token }}"
      metadata:
        labels:
          jenkins.io/credentials-type: usernamePassword
        annotations:
          jenkins.io/credentials-id: "github-token"
          jenkins.io/credentials-description: "GitHub Personal Access Token for PR validation and API access"
  data:
    - secretKey: token
      remoteRef:
        key: jenkins-github-token
